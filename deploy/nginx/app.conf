# --- Stage 1: HTTP only (for initial SSL certificate) ---
# After obtaining the certificate, switch to the full config below.

server {
    listen 80;
    server_name printersrus.co.uk www.printersrus.co.uk;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

