# Next.js dev server with bind-mounted source (hot reload; no rebuild on UI edits).
# Usage:
#   docker compose -f docker-compose.dev.yml --env-file .env.smtp.local up --build
# Stop the production compose stack first if it also binds port 3000.
# After dependency changes (package.json / lockfile), run:
#   docker compose -f docker-compose.dev.yml exec web npm ci

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    # Loads SMTP_* / SUPER_ADMIN_EMAIL etc. from the gitignored .env.local so
    # secrets stay out of git. The explicit `environment:` block below still
    # wins for any keys it also sets.
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      COOKIE_SECURE: "false"
      NEXT_PUBLIC_STORE_NAME: PrintersRUs
      NEXT_PUBLIC_STORE_DESCRIPTION: Your one-stop shop for printers, ink & accessories
      ADMIN_SETUP_KEY: printersrus-admin-2026
      # Webpack dev server (see Dockerfile.dev --webpack) uses watchpack; polling fixes missed edits on bind mounts.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # SMTP Configuration (order confirmation emails)
      # If not set, emails are sent via Ethereal test accounts (dev only – not delivered to real recipients)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-PrintersRUs <orders@printersrus.co.uk>}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - app-data:/app/data

volumes:
  node_modules:
  app-data:
