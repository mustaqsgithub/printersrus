name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

# Only one deploy at a time; cancel any in-progress run
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    if: always() # Continue deployment even if tests fail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /opt/printersrus

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building and restarting containers..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Verifying deployment..."
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)
            if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 301 ]; then
              echo "ERROR: Site returned HTTP $STATUS"
              docker compose -f docker-compose.prod.yml logs --tail 30
              exit 1
            fi
            echo "==> Deployment successful (HTTP $STATUS)"
