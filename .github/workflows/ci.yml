name: CI — Test

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Set up test environment variables
        run: |
          echo "STRIPE_SECRET_KEY=sk_test_dummy_key_for_ci" >> $GITHUB_ENV
          echo "PAYPAL_CLIENT_ID=test_dummy_client_id_for_ci" >> $GITHUB_ENV
          echo "PAYPAL_CLIENT_SECRET=test_dummy_secret_for_ci" >> $GITHUB_ENV
          echo "PAYPAL_ENV=sandbox" >> $GITHUB_ENV

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
