services:
  web:
    build: .
    container_name: printersrus-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://printersrus.co.uk
      - BASE_URL=https://printersrus.co.uk
      - COOKIE_SECURE=true
      - NEXT_PUBLIC_STORE_NAME=PrintersRUs
      - NEXT_PUBLIC_STORE_DESCRIPTION=Your one-stop shop for printers, ink & accessories
      - ADMIN_SETUP_KEY=${ADMIN_SETUP_KEY:?Set ADMIN_SETUP_KEY in .env}
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: printersrus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: printersrus-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - nginx
    # Initial certificate request (run manually first time):
    #   docker compose -f docker-compose.prod.yml run --rm certbot \
    #     certonly --webroot -w /var/www/certbot \
    #     -d printersrus.co.uk -d www.printersrus.co.uk \
    #     --email your-email@example.com --agree-tos --no-eff-email
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - internal

volumes:
  app-data:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  internal:
